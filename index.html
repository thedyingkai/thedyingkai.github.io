    <div class="progress"></div>

                    <div class="hero__image-stack" data-image-stack="homeHero" aria-hidden="true"></div>
                    <div class="hero__content"><span class="eyebrow" data-config="home.eyebrow">thedyingkai_ / TDK</span>

                    <p class="hero__lead" data-config="home.lead">这里存放 XCPC 训练、题解、工程项目和日常成长记录。喜欢洛天依和乐正绫，常用 ID 是 thedyingkai。</p>
                    <div class="hero__actions" data-home-actions><a class="btn btn--primary" href="/blog/">阅读文章</a><a class="btn"

                </div>

                        <div class="stat"><span>Signal</span><b>洛天依 / 乐正绫</b></div>

                    <div><span class="eyebrow">Notes</span>

                    </div>
                </div>
                <div class="grid grid--3" data-post-list="home"></div>
            </div>
        </section>
    </main>
    <footer class="footer" data-site-footer></footer>
    <script src="/assets/site.js?v=2.8"></script>
    <script type="module" src="/assets/runtime-config.js?v=1.8"></script>
