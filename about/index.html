<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="关于 TDK / thedyingkai_。">
    <title>关于 · TDK 的小窝</title>
    <link rel="icon" href="/ico.png">
    <link rel="stylesheet" href="/assets/site.css">
    <link rel="stylesheet" href="/assets/fonts.css?v=1.1">
    <link rel="stylesheet" href="/assets/post-renderer.css?v=1.2">
</head>

<body>
    <div class="progress"></div>
    <header class="topbar" data-site-header></header>
    <main>
        <section class="page-head wrap"><span class="eyebrow" data-config="about.eyebrow">About</span>
            <h1 data-config="about.title">关于</h1>
            <p data-config="about.lead"></p>
            <p data-config-error></p>
        </section>
        <section class="band">
            <div class="wrap profile-scene">
                <div data-about-profile></div>
                <div class="anime-slot" data-image-slot="aboutProfile"></div>
            </div>
        </section>
        <section class="band band--2">
            <div class="wrap">
                <div class="section-head">
                    <div><span class="eyebrow">Focus</span>
                        <h2>现在在做</h2>
                    </div>
                </div>
                <div class="grid grid--3" data-about-cards></div>
            </div>
        </section>
        <section class="band">
            <div class="wrap">
                <div class="section-head">
                    <div><span class="eyebrow">Timeline</span>
                        <h2>完整时间线</h2>
                    </div>
                </div>
                <div class="timeline" data-about-timeline></div>
            </div>
        </section>
    </main>
    <footer class="footer" data-site-footer></footer>
    <script src="/assets/site.js"></script>
    <script type="module" src="/assets/runtime-config.js?v=1.2"></script>
    <script src="/assets/images.js?v=1.0"></script>
</body>

</html>
