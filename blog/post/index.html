<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="TDK 的小窝文章阅读。">
    <title>文章 · TDK 的小窝</title>
    <link rel="icon" href="/ico.png">
    <link rel="stylesheet" href="/assets/site.css">
    <link rel="stylesheet" href="/assets/fonts.css?v=1.1">
    <link rel="stylesheet" href="/assets/post-renderer.css?v=1.4">
    <link rel="stylesheet" href="/assets/texme-render.css?v=2.0">
    <link rel="stylesheet" href="/highlight/styles/atom-one-dark.css">
</head>

<body>
    <div class="progress"></div>
    <header class="topbar" data-site-header></header>
    <main class="render-shell" data-post-view>
        <article class="render-body">
            <h1>Loading...</h1>
            <p>文章加载中。</p>
        </article>
    </main>
    <footer class="footer" data-site-footer></footer>
    <script src="/assets/site.js?v=1.3"></script>
    <script>window.texme = { renderOnLoad: false, style: 'none', protectMath: true, useMathJax: false }; window.MathJax = { tex: { inlineMath: [["$", "$"]], processEscapes: true }, options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }, startup: { typeset: false } };</script>
    <script src="https://cdn.jsdelivr.net/npm/texme@1.2.2/texme.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script src="/highlight/highlight.js"></script>
    <script src="/highlight/languages/c.js"></script>
    <script src="/highlight/languages/cpp.js"></script>
    <script src="/highlight/languages/python.js"></script>
    <script src="/highlight/languages/java.js"></script>
    <script src="/highlight/languages/bash.js"></script>
    <script src="/assets/article-renderer.js?v=5.1"></script>
</body>

</html>
