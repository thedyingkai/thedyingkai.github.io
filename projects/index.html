<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="TDK 的项目索引。">
    <title>项目 · TDK 的小窝</title>
    <link rel="icon" href="/assets/images/site/ico.png">
    <link rel="stylesheet" href="/assets/site.css?v=1.7">
    <link rel="stylesheet" href="/assets/fonts.css?v=1.1">
</head>

<body>
    <div class="progress"></div>
    <header class="topbar" data-site-header></header>
    <main>
        <section class="page-head wrap"><span class="eyebrow" data-config="projects.eyebrow">Projects</span>
            <h1 data-config="projects.title">项目</h1>
            <p data-config="projects.lead"></p>
            <p data-config-error></p>
        </section>
        <section class="band">
            <div class="wrap">
                <div class="section-head">
                    <div><span class="eyebrow">Featured</span>
                        <h2>核心项目</h2>
                    </div>
                </div>
                <div class="grid grid--3" data-projects-featured></div>
            </div>
        </section>
        <section class="band band--2">
            <div class="wrap">
                <div class="section-head">
                    <div><span class="eyebrow">Map</span>
                        <h2>项目方向</h2>
                    </div>
                </div>
                <div class="grid grid--3" data-projects-directions></div>
            </div>
        </section>
    </main>
    <footer class="footer" data-site-footer></footer>
    <script src="/assets/site.js?v=1.7"></script>
    <script type="module" src="/assets/runtime-config.js?v=1.3"></script>
</body>

</html>
