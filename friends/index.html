<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="TDK 的小窝友链。">
    <title>友链 · TDK 的小窝</title>
    <link rel="icon" href="/assets/images/site/ico.png">
    <link rel="stylesheet" href="/assets/site.css">
    <link rel="stylesheet" href="/assets/fonts.css?v=1.1">
</head>

<body>
    <div class="progress"></div>
    <header class="topbar" data-site-header></header>
    <main>
        <section class="page-head wrap"><span class="eyebrow" data-config="friends.eyebrow">Friends</span>
            <h1 data-config="friends.title">友链</h1>
            <p data-config="friends.lead"></p>
            <p data-config-error></p>
        </section>
        <section class="band">
            <div class="wrap">
                <div class="section-head">
                    <div><span class="eyebrow">Links</span>
                        <h2>朋友们</h2>
                    </div>
                </div>
                <div class="grid grid--3" data-friends-links></div>
            </div>
        </section>
        <section class="band band--2">
            <div class="wrap">
                <div class="section-head">
                    <div><span class="eyebrow">Exchange</span>
                        <h2>交换友链</h2>
                    </div>
                </div>
                <div class="grid grid--2" data-friends-apply></div>
            </div>
        </section>
    </main>
    <footer class="footer" data-site-footer></footer>
    <script src="/assets/site.js?v=1.4"></script>
    <script type="module" src="/assets/runtime-config.js?v=1.2"></script>
</body>

</html>
